# Color scheme setup
background #09000f
background_opacity 0.95
foreground #ffffff 
selection_background #3c2a4d  
selection_foreground #ffffff 
cursor #7766ff  

# File path color
ansi_0 #2d1e3e
ansi_1 #ff3d67
ansi_2 #3fffc0
ansi_3 #ffd700
ansi_4 #7766ff  
ansi_5 #9b59b6
ansi_6 #00b0f0
ansi_7 #ffffff

# Font setup
font_family Hack
font_size 8
enable_ligatures true

# Tab completion (directory auto-completion)
map ctrl+space send_text "\x1b[1;5C" 

# Scrollback lines
scrollback_lines 10000
