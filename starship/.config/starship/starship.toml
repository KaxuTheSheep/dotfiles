add_newline = false
palette= 'amethyst'
# в”Җв”Җв”Җ Palette в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[palettes.amethyst]
accent = "#7766FF"
bg     = "#04040A"
fg     = "#C8B8FF"
dark   = "#2A1B5E"
mid    = "#3D2B8A"
error  = "#FF4466"

# в”Җв”Җв”Җ Format в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

format = """
  $os\
  $directory\
  $git_branch$git_commit$git_state $git_status\
  $c\
  $cpp\
  $java\
  $python\
  $rust\
  $nodejs\
  $custom\
  $status\
  $character\n
"""

continuation_prompt = 'в–¶в–¶ '

# в”Җв”Җв”Җ Operating System в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[os]
disabled = false
format = "[$symbol ](bold fg:accent)"

[os.symbols]
Fedora = "пҢӢ "

# в”Җв”Җв”Җ Directory в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[directory]
disabled = false
format = "[$path](bold fg:fg)"
truncate_to_repo = false
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = "о°ӣ "
"Pictures"  = "уұўү "
"Music"     = "о°ӣ "

# в”Җв”Җв”Җ Git в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[git_branch]
format = " [ оӮ  $branch](fg:#9198a1)"

[git_status]
ahead = 'вҮЎ${count}'
behind = 'вҮЈ${count}'
diverged = 'вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}'
format = '[[(оӘ„ $all_status$ahead_behind )](fg:#769ff0)]($style)'
style = "bg:#394260"

# в”Җв”Җв”Җ Character в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[character]
success_symbol = "[вқҜ](bold fg:accent)"
error_symbol   = "[вқҜ](bold fg:error)"

# в”Җв”Җв”Җ Languages в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[c]
format = " [$symbol]($style)"
style = "bold fg:fg"
symbol = "оҳһ "
detect_extensions = ["c", "h"]

[cpp]
format = " [$symbol]($style)"
style = "bold fg:fg"
symbol = "оҳқ "
detect_extensions = ["cpp", "hpp", "cc", "cxx"]

[java]
format = " [$symbol]($style)"
style = "bold fg:fg"
symbol = "оһҒ "

[python]
format = " [$symbol($virtualenv)]($style)"
style = "bold fg:fg"
symbol = "оңј "
version_format = "${raw}"

[rust]
format = " [$symbol]($style)"
style = "bold fg:fg"
symbol = " "

[nodejs]
format = " [$symbol]($style)"
style = "bold fg:fg"
symbol = "у°Һҷ "
detect_extensions = ["js", "mjs", "cjs", "ts"]
detect_files = ["package.json", "package-lock.json", "yarn.lock"]
detect_folders = ["node_modules"]
version_format = "${raw}"

