-------------------- ADJUSTMENT --------------------

# SOURCES
$img                        = ~/.config/hypr/hyprlock/
$wallpaper                  = ~/dotfiles/wallpaper/.current_wallpaper

# COLORS
$background                 = rgba(0, 0, 0, 0) #transparent
$foreground                 = rgba(255, 255, 255, 1.0)
$foreground-alt             = rgba(255, 255, 255, 0.3)
$color1                     =

$fail                       = rgba(221, 8, 8, 0.8)

# FONT 
$main                       = Ndot55
$mono      					= Departure Mono Nerd Font



--------------------- GENERAL --------------------

general = {
    disable_loading_bar     = true,
    hide_cursor             = true,
    ignore_empty_input      = true,
    immediate_render        = true
}



-------------------- BACKGROUND --------------------

background {
    monitor                 =
    path                    = $wallpaper
    blur_passes             = 2
    blur_size               = 5
    contrast                = 0.8916
    brightness              = 0.8172
    vibrancy                = 0.1696
    vibrancy_darkness       = 0.0

}



-------------------- ELEMENT --------------------

# TOP LINE
shape {
    monitor                 =
    size                    = 1850, 2
    color                   = $foreground
    rounding                = -1 # circle
    position                = 0, 427
    halign                  = center
    valign                  = center
}


# USERBOX TOP LINE
shape {
    monitor                 =
    size                    = 140, 1
    color                   = $foreground
    rounding                = -1
    
    position                = 150, 51
    halign                  = left
    valign                  = bottom
}

# USERBOX BOT LINE
shape {
    monitor                 =
    size                    = 140, 1
    color                   = $foreground
    rounding                = -1
    
    position                = 150, 26
    halign                  = left
    valign                  = bottom
}

# PILL
shape {
    monitor                 =
    size                    = 80, 40
    color                   = $background # no fill
    rounding                = -1 # circle
    border_color            = $foreground
    border_size             = 1
    
    position                = -39, -17
    halign                  = right
    valign                  = top
}


-------------------- TIME & DATE --------------------

# CLOCK-HOUR
label {
    monitor                 =
    text                    = cmd[update:1000] echo "<b><big> $(date +"%I") </big></b>" # 12-h format (%H for 24-h format)
    color                   = $foreground
    font_family             = $main
    font_size               = 80
    
    position                = 7, -22
    halign                  = left
    valign                  = top
}

# CLOCK-MINUTE
label {
    monitor                 =
    text                    = cmd[update:1000] echo "<b><big> $(date +"%M") </big></b>"
    color                   = $foreground
    font_family             = $main
    font_size               = 80
    
    position                = 7, -123
    halign                  = left
    valign                  = top
}

# DATE
label {
    monitor                 =
    text                    = cmd[update:1000] echo -e "$(date +"%a %B %d")"
    color                   = $foreground
    font_family             = $main
    font_size               = 50

    position                = -20, -125 
    rotate                  = 90
    halign                  = right
    valign                  = top
}

# YEAR
label {
    monitor                 =
    text                    = cmd[update:1000] echo -e "$(date +"%Y")"
    color                   = $foreground
    font_family             = $main
    font_size               = 20

    position                = -48, -28 
    halign                  = right
    valign                  = top
}



-------------------- TEXT --------------------

# NAME
label {
    monitor                 =
    text                    = KAXU
    color                   = $foreground
    font_family             = $main
    font_size               = 11

    position                = -1640, 55
    halign                  = right
    valign                  = bottom
}
# TAG-BOT
label {
    monitor                 =
    text                    = AMETHYST
    color                   = $foreground
    font_family             = $main bold
    font_size               = 12

    position                = -35, 25
    halign                  = right
    valign                  = bottom
}

# HIRAGANA
label {   
    monitor                 =
    text                    = かいぜん
    color                   = $foreground
    font_family             = $mono
    font_size               = 10

    position                = 0, 190
    halign                  = center
    valign                  = bottom
}



--------------------- USER --------------------

# AVATAR
image {
    monitor                 =
    path                    = $img/profile_picture.jpg
    border_color            = $foreground-alt
    border_size             = 0
    size                    = 110
    rounding                = 6
    rotate                  = 0
    opacity                 = 1

    reload_time             = -1
    reload_cmd              = 

    position                = 30, 25
    halign                  = left
    valign                  = bottom
}



-------------------- INPUT --------------------

# INPUT BOX
input-field {
    monitor             = eDP-1
    size                = 80, 25
    rounding            = 0
    outline_thickness   = 0
    hide_input          = false

    inner_color         = $background
    outer_color         = $background
    check_color         = $background

    dots_size           = 0.35
    dots_spacing        = 0.3
    dots_center         = true
    dots_rounding       = -1

    font_family         = $mono
    font_color          = $foreground
    font_size 			= 20

    placeholder_text    = PASSCODE
    fail_text           = WRONG PASSCODE <b>($ATTEMPTS)</b>
    fail_color          = $fail

    fade_on_empty       = false
    fade_timeout        = 200
    fail_transition     = 300

    position            = -700, -505
    halign              = center
    valign              = center
}



-------------------- WIDGET --------------------

# BATTERY
label {
    monitor             =
    text                = cmd[update:1000] echo -e "$($widget/battery.sh)"
    color               = $foreground
    font_family         = $main Bold
    font_size           = 12
    
    
    position            = -1080, 110
    halign              = right
    valign              = bottom
    zindex              = 1
}
