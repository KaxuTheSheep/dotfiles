###############
### INPUT   ###
###############

input-field {
    monitor             = eDP-1
    size                = 80, 25
    rounding            = 0
    outline_thickness   = 0
    hide_input          = false
    inner_color         = $background
    outer_color         = $background
    check_color         = $background
    dots_size           = 0.35
    dots_spacing        = 0.3
    dots_center         = true
    dots_rounding       = -1
    font_family         = $mono
    font_color          = $foreground
    font_size           = 20
    placeholder_text    = PASSCODE
    fail_text           = WRONG PASSCODE <b>($ATTEMPTS)</b>
    fail_color          = $fail
    fade_on_empty       = false
    fade_timeout        = 200
    fail_transition     = 300
    position            = -700, -505
    halign              = center
    valign              = center
}
input-field {
    monitor             = HDMI-A-1
    size                = 80, 25
    rounding            = 0
    outline_thickness   = 0
    hide_input          = false
    inner_color         = $background
    outer_color         = $background
    check_color         = $background
    dots_size           = 0.35
    dots_spacing        = 0.3
    dots_center         = true
    dots_rounding       = -1
    font_family         = $mono
    font_color          = $foreground
    font_size           = 20
    placeholder_text    = PASSCODE
    fail_text           = WRONG PASSCODE <b>($ATTEMPTS)</b>
    fail_color          = $fail
    fade_on_empty       = false
    fade_timeout        = 200
    fail_transition     = 300
    position            = -1020, -685
    halign              = center
    valign              = center
}


