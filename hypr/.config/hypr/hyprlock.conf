##################
### HYPRLOCK   ###
##################

# SOURCES
$img        = ~/.config/hypr/hyprlock
$wallpaper  = ~/dotfiles/wallpaper/.current_wallpaper

# COLORS
$background     = rgba(0, 0, 0, 0)
$foreground     = rgba(255, 255, 255, 1.0)
$foreground-alt = rgba(255, 255, 255, 0.3)
$fail           = rgba(221, 8, 8, 0.8)

# FONTS
$main = Ndot55
$mono = Departure Mono Nerd Font


##################
### GENERAL    ###
##################

general {
    disable_loading_bar  = true
    hide_cursor          = true
    ignore_empty_input   = true
    immediate_render     = true
}


##################
### BACKGROUND ###
##################

background {
    monitor         =
    path            = $wallpaper
    blur_passes     = 2
    blur_size       = 5
    contrast        = 0.8916
    brightness      = 0.8172
    vibrancy        = 0.1696
    vibrancy_darkness = 0.0
}


##################
### TOP LINE   ###
##################

shape {
    monitor     = eDP-1
    size        = 1850, 2
    color       = $foreground
    rounding    = -1
    position    = 0, 427
    halign      = center
    valign      = center
}
shape {
    monitor     = HDMI-A-1
    size        = 2500, 2
    color       = $foreground
    rounding    = -1
    position    = 0, 610
    halign      = center
    valign      = center
}


