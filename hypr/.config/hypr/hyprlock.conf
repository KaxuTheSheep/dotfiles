##################
### CLOCK HOUR ###
##################

label {
    monitor     = eDP-1
    text        = cmd[update:1000] echo "<b><big> $(date +"%H") </big></b>"
    color       = $foreground
    font_family = $main
    font_size   = 80
    position    = 7, -22
    halign      = left
    valign      = top
}
label {
    monitor     = HDMI-A-1
    text        = cmd[update:1000] echo "<b><big> $(date +"%H") </big></b>"
    color       = $foreground
    font_family = $main
    font_size   = 80
    position    = 7, -22
    halign      = left
    valign      = top
}


