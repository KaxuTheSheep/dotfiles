# ── Navigation ───────────────────────────────────────────────
[[mgr.prepend_keymap]]
on   = "q"
run  = "quit"
desc = "Quit"

[[mgr.prepend_keymap]]
on   = "<Enter>"
run  = "enter"
desc = "Enter directory"

[[mgr.prepend_keymap]]
on   = "<Backspace>"
run  = "leave"
desc = "Go to parent directory"

# ── File Operations ───────────────────────────────────────────
[[mgr.prepend_keymap]]
on   = "n"
run  = "create"
desc = "Create file/dir"

[[mgr.prepend_keymap]]
on   = "r"
run  = "rename"
desc = "Rename file"

[[mgr.prepend_keymap]]
on   = "d"
run  = "remove"
desc = "Move to trash"

[[mgr.prepend_keymap]]
on   = "D"
run  = "remove --permanently"
desc = "Delete permanently"

# ── Yank / Paste ─────────────────────────────────────────────
[[mgr.prepend_keymap]]
on   = "y"
run  = "yank"
desc = "Copy"

[[mgr.prepend_keymap]]
on   = "x"
run  = "yank --cut"
desc = "Cut"

[[mgr.prepend_keymap]]
on   = "p"
run  = "paste"
desc = "Paste"

[[mgr.prepend_keymap]]
on   = "c"
run  = "copy path"
desc = "Copy path to clipboard"

# ── Selection ────────────────────────────────────────────────
[[mgr.prepend_keymap]]
on   = "<Space>"
run  = "toggle"
desc = "Toggle selection"

[[mgr.prepend_keymap]]
on   = "a"
run  = "toggle_all"
desc = "Select all"

# ── Open With ────────────────────────────────────────────────
[[mgr.prepend_keymap]]
on   = "v"
run  = "shell -- nvim %h"
desc = "Open in Neovim"

[[mgr.prepend_keymap]]
on   = "m"
run  = "shell -- mpv %h"
desc = "Open in mpv"

# ── Misc ─────────────────────────────────────────────────────
[[mgr.prepend_keymap]]
on   = "."
run  = "hidden toggle"
desc = "Toggle hidden files"

[[mgr.prepend_keymap]]
on   = "f"
run  = "find"
desc = "Find files"

[[mgr.prepend_keymap]]
on   = "/"
run  = "search --via=fd"
desc = "Search files"

# ── Goto Shortcuts ───────────────────────────────────────────
[[mgr.prepend_keymap]]
on   = [ "g", "h" ]
run  = "cd ~"
desc = "Go to home"

[[mgr.prepend_keymap]]
on   = [ "g", "d" ]
run  = "cd ~/Downloads"
desc = "Go to Downloads"

[[mgr.prepend_keymap]]
on   = [ "g", "c" ]
run  = "cd ~/.config"
desc = "Go to .config"

[[mgr.prepend_keymap]]
on   = [ "g", "D" ]
run  = "cd ~/dotfiles"
desc = "Go to dotfiles"

[[mgr.prepend_keymap]]
on   = [ "g", "w" ]
run  = "cd ~/dotfiles/wallpaper"
desc = "Go to wallpapers"
